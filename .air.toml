root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ."
  bin = "tmp\\main.exe"
  full_bin = ".\\tmp\\main.exe"
  include_ext = ["go"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  delay = 1500
  stop_on_error = true

[log]
  time = false
  main_only = false
  send_interrupt = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true